<!DOCTYPE html>
<html lang="en">
<head>
<meta name="robots" content="noindex, nofollow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jacob Schwartz | YidProfile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --black:#09090E; --navy:#0D1B2A; --blue:#1565C0; --sky:#42A5F5; --white:#EEF3F8; --gray:#7A8899; }
  body { background:var(--black); color:var(--white); font-family:'DM Sans',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse 80% 60% at 10% 0%,rgba(21,101,192,0.15) 0%,transparent 60%); pointer-events:none; }
  .card { position:relative; background:var(--navy); border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:40px 32px 36px; max-width:380px; width:100%; text-align:center; animation:fadeUp 0.6s ease both; }
  .avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--sky)); display:flex; align-items:center; justify-content:center; font-family:'Syne',sans-serif; font-size:26px; font-weight:800; color:white; margin:0 auto 20px; }
  .status { display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:500; letter-spacing:0.08em; text-transform:uppercase; color:var(--sky); background:rgba(66,165,245,0.08); border:1px solid rgba(66,165,245,0.18); border-radius:100px; padding:5px 12px; margin-bottom:16px; }
  .dot { width:6px; height:6px; border-radius:50%; background:#4CAF50; box-shadow:0 0 5px #4CAF50; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  h1 { font-family:'Syne',sans-serif; font-size:32px; font-weight:800; letter-spacing:-0.02em; line-height:1.1; margin-bottom:8px; }
  h1 span { color:var(--sky); }
  .tagline { font-size:13px; color:var(--gray); font-weight:300; margin-bottom:6px; }
  .location { font-size:12px; color:#3A5A7A; margin-bottom:32px; }
  .divider { height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent); margin-bottom:28px; }
  .btn-wrap { display:flex; flex-direction:column; gap:12px; margin-bottom:28px; }
  .btn { display:flex; align-items:center; justify-content:center; gap:12px; padding:16px 20px; border-radius:14px; font-family:'Syne',sans-serif; font-size:15px; font-weight:700; letter-spacing:0.02em; text-decoration:none; transition:transform 0.15s,filter 0.15s; cursor:pointer; border:none; }
  .btn:hover { transform:translateY(-2px); filter:brightness(1.1); }
  .btn-resume { background:var(--blue); color:white; }
  .btn-contact { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1)!important; color:var(--white); }
  .btn svg { width:18px; height:18px; flex-shrink:0; }
  .phone { font-size:13px; color:#3A5A7A; }
  .phone a { color:var(--sky); text-decoration:none; }
  .powered { font-size:11px; color:#1E3A4A; margin-top:20px; }
  .powered a { color:#2E5A7A; text-decoration:none; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>
<div class="card">
  <div class="avatar">JS</div>

  <h1>Jacob<br><span>Schwartz</span></h1>
  <p class="tagline">Supervisor · Logistics & Operations · Driver</p>
  <p class="location">📍 Lakewood, NJ</p>
  <div class="divider"></div>
  <div class="btn-wrap">
    <a class="btn btn-resume" href="Jacob_Schwartz_Resume.pdf" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Download Resume
    </a>
    <a class="btn btn-contact" href="jacob.vcf" download>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Save My Contact
    </a>
  </div>
  <p class="phone">Or call: <a href="tel:8482858878">848-285-8878</a></p>
  <p class="powered">Powered by <a href="https://yidprofile.com">YidProfile.com</a></p>
</div>
</body>
</html>
